modLoader = "javafml"
loaderVersion = "[4,)"
license = "${modLicense}"

[[mods]]
modId = "${modId}"
version = "${modFullVersion}"
displayName = "${modName}"
description = '''${modDescription}'''
logoFile = "${modId}.png"
authors = "${modAuthor}"
displayURL = "${modURL}"
modUrl = "${modURL}"
${__NEOFORGE_UPDATE_CHECKER__}

[[mixins]]
config = "${modId}.mixins.json"

[[mixins]]
config = "${modId}.neoforge.mixins.json"

[[dependencies.${modId}]]
modId = "neoforge"
type = "required"
versionRange = "${neoForgeVersionRange}"
ordering = "NONE"
side = "BOTH"

[[dependencies]]
modId = "minecraft"
type = "required"
versionRange = "${minecraftVersionRange}"
ordering = "NONE"
side = "BOTH"